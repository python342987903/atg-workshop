<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>六安阿堂哥网络工作室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans SC', sans-serif;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    }
    .gold-gradient {
      background: linear-gradient(135deg, #D4AF37 0%, #F5DEB3 100%);
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .float-animation {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .chat-bubble {
      animation: bubbleIn 0.3s ease-out;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .admin-sidebar {
      transition: all 0.3s ease;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="app">
    <div style="padding: 20px; text-align: center;">
      <p>正在加载...</p>
    </div>
  </div>
  
  <script>

    image: 'https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=800&h=600&fit=crop'

    id: '2',
    title: '视频拍摄及推广',

    price: 4999,
    category: 'development',
    features: ['响应式设计', '定制化开发', '源码交付', '一年免费维护'],
    image: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800&h=600&fit=crop'
  }
];

let state = {
  currentPage: 'home',
  user: null,
  cart: [],
  orders: [],
  messages: [],
  chatOpen: false,
  currentService: null,
  currentOrder: null,
  isAdmin: false,
  adminPassword: 'admin123',
  paymentCodes: {
    wechat: '',
    alipay: ''
  }
};

const botResponses = [
  '您好！欢迎咨询六安阿堂哥网络工作室，请问有什么可以帮助您的？',
  '我们提供聚合支付、视频制作、修图服务、网站开发等服务。',
  '请留下您的联系方式，我们会尽快与您取得联系。',
  '感谢您的咨询！我们的客服人员会在工作时间内回复您。'
];

function loadState() {
  const savedUser = localStorage.getItem('user');
  const savedCart = localStorage.getItem('cart');
  const savedOrders = localStorage.getItem('orders');
  const savedMessages = localStorage.getItem('allMessages');
  const savedPaymentCodes = localStorage.getItem('paymentCodes');
  
  if (savedUser) state.user = JSON.parse(savedUser);
  if (savedCart) state.cart = JSON.parse(savedCart);
  if (savedOrders) state.orders = JSON.parse(savedOrders);
  if (savedMessages) state.allMessages = JSON.parse(savedMessages);
  if (savedPaymentCodes) state.paymentCodes = JSON.parse(savedPaymentCodes);
  
  if (!state.allMessages) state.allMessages = [];
}

function saveState() {
  if (state.user) localStorage.setItem('user', JSON.stringify(state.user));
  localStorage.setItem('cart', JSON.stringify(state.cart));
  localStorage.setItem('orders', JSON.stringify(state.orders));
  localStorage.setItem('allMessages', JSON.stringify(state.allMessages || []));
  localStorage.setItem('paymentCodes', JSON.stringify(state.paymentCodes));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function navigate(page, data = null) {
  state.currentPage = page;
  if (data) {
    if (data.service) state.currentService = data.service;
    if (data.order) state.currentOrder = data.order;
  }
  render();
}

function renderNavbar() {
  return `
    <nav class="gradient-bg shadow-lg sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div class="w-10 h-10 gold-gradient rounded-full flex items-center justify-center">
              <span class="text-white font-bold text-lg">堂</span>
            </div>
            <span class="ml-3 text-white font-bold text-xl">六安阿堂哥网络工作室</span>
          </div>
          <div class="flex items-center space-x-4">
            <button onclick="navigate('home')" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">首页</button>
            ${state.isAdmin ? `
              <button onclick="navigate('admin')" class="gold-gradient text-slate-900 px-4 py-2 rounded-lg text-sm font-semibold">管理后台</button>
            ` : ''}
            <button onclick="navigate('cart')" class="relative text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">
              购物车
              ${state.cart.length > 0 ? `<span class="absolute -top-1 -right-1 bg-yellow-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">${state.cart.length}</span>` : ''}
            </button>
            ${state.user ? `
              <button onclick="navigate('orders')" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">我的订单</button>
              <button onclick="navigate('user')" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">${state.user.name}</button>

            ` : `
              <button onclick="navigate('login')" class="text-gray-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium">登录</button>

}

            <div class="text-white">
              <div class="w-16 h-16 gold-gradient rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-2xl">🚀</span>
              </div>

function renderAdmin() {
  const statusText = {
    pending: '待支付',
    paid: '已支付',
    shipped: '已发货',
    delivered: '已签收',
    reviewed: '已评价'
  };

  const statusColors = {
    pending: 'bg-orange-100 text-orange-800',
    paid: 'bg-blue-100 text-blue-800',
    shipped: 'bg-purple-100 text-purple-800',
    delivered: 'bg-green-100 text-green-800',
    reviewed: 'bg-gray-100 text-gray-800'
  };

  const recentMessages = (state.allMessages || []).slice(-20).reverse();

  return `
    <div class="fade-in min-h-screen bg-gray-100">
      <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
          <h1 class="text-3xl font-bold text-slate-800">管理后台</h1>
          <button onclick="navigate('adminSettings')" class="gold-gradient text-slate-900 px-4 py-2 rounded-lg font-semibold">设置收款码</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-xl shadow-md p-6">
            <div class="text-3xl mb-2">📦</div>
            <h3 class="text-xl font-bold text-slate-800">${state.orders.length}</h3>
            <p class="text-gray-600">总订单数</p>
          </div>
          <div class="bg-white rounded-xl shadow-md p-6">
            <div class="text-3xl mb-2">💰</div>
            <h3 class="text-xl font-bold text-slate-800">¥${state.orders.reduce((sum, o) => sum + o.totalPrice, 0)}</h3>
            <p class="text-gray-600">总销售额</p>
          </div>
          <div class="bg-white rounded-xl shadow-md p-6">
            <div class="text-3xl mb-2">💬</div>
            <h3 class="text-xl font-bold text-slate-800">${(state.allMessages || []).length}</h3>
            <p class="text-gray-600">咨询消息</p>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-slate-800 mb-6">订单管理</h2>
            <div class="space-y-4 max-h-96 overflow-y-auto">
              ${state.orders.length === 0 ? '<p class="text-gray-500 text-center py-8">暂无订单</p>' : ''}
              ${state.orders.slice().reverse().map(order => `
                <div class="border rounded-lg p-4">
                  <div class="flex justify-between items-start mb-2">
                    <div>
                      <p class="font-semibold">订单 #${order.id}</p>
                      <p class="text-sm text-gray-500">${new Date(order.createdAt).toLocaleString()}</p>
                    </div>
                    <span class="status-badge ${statusColors[order.status]}">${statusText[order.status]}</span>
                  </div>
                  <p class="text-sm text-gray-600 mb-2">${order.address.split('|')[0]} - ${order.phone}</p>
                  <p class="font-bold text-yellow-600">¥${order.totalPrice}</p>
                  <div class="flex space-x-2 mt-3">
                    ${order.status === 'pending' ? `<button onclick="updateOrderStatus('${order.id}', 'paid')" class="text-sm bg-blue-500 text-white px-3 py-1 rounded">标记已支付</button>` : ''}
                    ${order.status === 'paid' ? `<button onclick="updateOrderStatus('${order.id}', 'shipped')" class="text-sm bg-purple-500 text-white px-3 py-1 rounded">标记已发货</button>` : ''}
                    ${order.status === 'shipped' ? `<button onclick="updateOrderStatus('${order.id}', 'delivered')" class="text-sm bg-green-500 text-white px-3 py-1 rounded">标记已签收</button>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-bold text-slate-800 mb-6">实时聊天</h2>
            <div class="space-y-3 max-h-80 overflow-y-auto mb-4">
              ${recentMessages.length === 0 ? '<p class="text-gray-500 text-center py-8">暂无咨询消息</p>' : ''}
              ${recentMessages.map(msg => `
                <div class="p-3 rounded-lg ${msg.type === 'user' ? 'bg-blue-50' : 'bg-gray-50'}">
                  <div class="flex items-start justify-between mb-1">
                    <span class="text-sm font-semibold">${msg.type === 'user' ? '访客' : '客服'}</span>
                    <span class="text-xs text-gray-400">${new Date(msg.timestamp).toLocaleString()}</span>
                  </div>
                  <p class="text-sm">${msg.content}</p>
                </div>
              `).join('')}
            </div>
            <div class="border-t pt-4">
              <p class="text-sm text-gray-500 mb-2">快速回复</p>
              <div class="flex flex-wrap gap-2">
                <button onclick="adminQuickReply('您好！请问有什么可以帮助您的？')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded-full">您好</button>

                <button onclick="adminQuickReply('请留下您的联系方式，我们会尽快联系您。')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded-full">留联系方式</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAdminSettings() {
  return `
    <div class="fade-in min-h-screen bg-gray-100">
      <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-center mb-8">
          <button onclick="navigate('admin')" class="text-gray-600 hover:text-gray-800 mr-4">← 返回</button>
          <h1 class="text-3xl font-bold text-slate-800">收款码设置</h1>
        </div>

        <div class="bg-white rounded-xl shadow-md p-8">
          <div class="mb-6 p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
            <p class="text-blue-700"><strong>提示：</strong>您可以将收款码图片保存为 <code>images/wechat.jpg</code> 和 <code>images/alipay.jpg</code>，或者直接上传。</p>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
              <h3 class="text-xl font-bold text-slate-800 mb-4">微信收款码</h3>
              <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center mb-4">
                ${state.paymentCodes.wechat ? `
                  <img src="${state.paymentCodes.wechat}" alt="微信收款码" class="max-w-full h-64 mx-auto object-contain">
                ` : `
                  <img src="images/wechat.jpg" alt="微信收款码" class="max-w-full h-64 mx-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                  <div class="py-12 hidden">
                    <p class="text-gray-400">请上传微信收款码</p>
                  </div>

              </div>
              <input type="file" accept="image/*" onchange="uploadPaymentCode('wechat', this)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
            </div>

            <div>
              <h3 class="text-xl font-bold text-slate-800 mb-4">支付宝收款码</h3>
              <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center mb-4">
                ${state.paymentCodes.alipay ? `
                  <img src="${state.paymentCodes.alipay}" alt="支付宝收款码" class="max-w-full h-64 mx-auto object-contain">
                ` : `
                  <img src="images/alipay.jpg" alt="支付宝收款码" class="max-w-full h-64 mx-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                  <div class="py-12 hidden">
                    <p class="text-gray-400">请上传支付宝收款码</p>
                  </div>
                `}
              </div>
              <input type="file" accept="image/*" onchange="uploadPaymentCode('alipay', this)" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
          </div>

          <div class="mt-8">
            <h3 class="text-xl font-bold text-slate-800 mb-4">管理密码</h3>
            <div class="flex space-x-4">
              <input type="password" id="newAdminPassword" placeholder="新密码" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500">
              <button onclick="changeAdminPassword()" class="gold-gradient text-slate-900 px-6 py-3 rounded-lg font-semibold">修改密码</button>
            </div>
            <p class="text-sm text-gray-500 mt-2">当前密码：${state.adminPassword}</p>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderService() {
  const service = services.find(s => s.id === state.currentService);
  if (!service) return '<div class="text-center py-20">服务不存在</div>';
  
  return `
    <div class="fade-in max-w-5xl mx-auto px-4 py-12">
      <button onclick="navigate('home')" class="text-gray-600 hover:text-gray-800 mb-8 flex items-center">← 返回首页</button>
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="grid grid-cols-1 lg:grid-cols-2">
          <div class="h-80 lg:h-auto">
            <img src="${service.image}" alt="${service.title}" class="w-full h-full object-cover">
          </div>
          <div class="p-8 lg:p-12">
            <h1 class="text-3xl font-bold text-slate-800 mb-4">${service.title}</h1>
            <p class="text-gray-600 mb-6">${service.description}</p>
            <div class="text-4xl font-bold text-yellow-600 mb-8">¥${service.price}</div>
            <h3 class="text-lg font-semibold text-slate-800 mb-4">服务特色</h3>
            <ul class="space-y-3 mb-8">
              ${service.features.map(feature => `<li class="flex items-center text-gray-600"><span class="text-green-500 mr-3">✓</span>${feature}</li>`).join('')}
            </ul>
            <button onclick="addToCart('${service.id}')" class="w-full gold-gradient text-slate-900 py-4 rounded-lg font-bold text-lg hover:opacity-90 transition">加入购物车</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderLogin() {
  return `

    pending: '待支付',

    shipped: '已发货',
    delivered: '已签收',
    reviewed: '已评价'
  };
  const statusColor = {
    pending: 'text-orange-500',

  return `

function render() {
  let pageContent = '';
  
  switch(state.currentPage) {
    case 'home': pageContent = renderHome(); break;
    case 'service': pageContent = renderService(); break;
    case 'login': pageContent = renderLogin(); break;
    case 'register': pageContent = renderRegister(); break;
    case 'cart': pageContent = renderCart(); break;
    case 'checkout': pageContent = renderCheckout(); break;
    case 'payment': pageContent = renderPayment(); break;
    case 'orders': pageContent = renderOrders(); break;
    case 'order': pageContent = renderOrderDetail(); break;
    case 'user': pageContent = renderUser(); break;
    case 'admin': pageContent = renderAdmin(); break;
    case 'adminSettings': pageContent = renderAdminSettings(); break;
    default: pageContent = renderHome();
  }
  
  document.getElementById('app').innerHTML = `
    ${renderNavbar()}
    <main>${pageContent}</main>
    ${state.currentPage !== 'admin' && state.currentPage !== 'adminSettings' ? renderChat() : ''}
  `;
}

function addToCart(serviceId) {
  const service = services.find(s => s.id === serviceId);
  if (!service) return;
  
  const existingItem = state.cart.find(item => item.service.id === serviceId);
  if (existingItem) {
    existingItem.quantity++;
  } else {
    state.cart.push({ service, quantity: 1 });
  }
  
  saveState();
  alert('已添加到购物车！');
  navigate('cart');
}

function updateQuantity(index, delta) {
  state.cart[index].quantity += delta;
  if (state.cart[index].quantity < 1) state.cart[index].quantity = 1;
  saveState();
  render();
}

function removeFromCart(index) {
  state.cart.splice(index, 1);
  saveState();
  render();
}

function handleLogin(e) {
  e.preventDefault();
  const phone = document.getElementById('loginPhone').value;
  const password = document.getElementById('loginPassword').value;
  
  const users = JSON.parse(localStorage.getItem('users') || '[]');
  const user = users.find(u => u.phone === phone);
  
  if (user) {
    state.user = user;
    saveState();
    alert('登录成功！');
    navigate('home');
  } else {
    alert('用户不存在，请先注册！');
  }
}

function handleRegister(e) {
  e.preventDefault();
  const phone = document.getElementById('registerPhone').value;
  const name = document.getElementById('registerName').value;
  const password = document.getElementById('registerPassword').value;
  
  const users = JSON.parse(localStorage.getItem('users') || '[]');
  
  if (users.find(u => u.phone === phone)) {
    alert('该手机号已注册！');
    return;
  }
  
  const newUser = { id: generateId(), phone, name };
  users.push(newUser);
  localStorage.setItem('users', JSON.stringify(users));
  
  state.user = newUser;
  saveState();
  alert('注册成功！');
  navigate('home');
}

function logout() {
  state.user = null;
  state.isAdmin = false;
  localStorage.removeItem('user');
  navigate('home');
}

function handleCheckout(e) {
  e.preventDefault();
  
  const name = document.getElementById('receiverName').value;
  const phone = document.getElementById('receiverPhone').value;
  const address = document.getElementById('receiverAddress').value;
  
  if (!name || !phone || !address) {
    alert('请填写完整的收货信息！');
    return;
  }
  
  const total = state.cart.reduce((sum, item) => sum + item.service.price * item.quantity, 0);
  
  const order = {
    id: generateId(),
    userId: state.user.id,
    items: [...state.cart],
    totalPrice: total,
    status: 'pending',
    address: `${name}|${address}`,
    phone: phone,
    createdAt: new Date().toISOString()
  };
  
  state.orders.push(order);
  state.currentOrder = order;
  state.cart = [];
  saveState();
  
  navigate('payment');
}

let selectedPayment = null;
function selectPayment(method) {
  selectedPayment = method;
  
  document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('border-green-500', 'border-blue-500'));
  document.querySelectorAll('.payment-radio').forEach(el => {
    el.innerHTML = '';
    el.classList.remove('bg-green-500', 'bg-blue-500', 'border-transparent');
  });
  
  const selectedEl = document.querySelector(`[data-method="${method}"]`);
  selectedEl.classList.add(method === 'wechat' ? 'border-green-500' : 'border-blue-500');
  
  const radio = selectedEl.querySelector('.payment-radio');
  radio.innerHTML = '✓';
  radio.classList.add(method === 'wechat' ? 'bg-green-500' : 'bg-blue-500', 'text-white', 'border-transparent');
  
  const codeDiv = document.getElementById('paymentCode');
  const codeImage = document.getElementById('paymentCodeImage');
  
  codeDiv.classList.remove('hidden');
  
  // 优先使用上传的收款码，其次使用默认图片
  if (method === 'wechat') {
    if (state.paymentCodes.wechat) {
      codeImage.innerHTML = `<img src="${state.paymentCodes.wechat}" alt="微信收款码" class="w-full h-full object-contain">`;
    } else {
      codeImage.innerHTML = `<img src="images/wechat.jpg" alt="微信收款码" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="text-gray-500 text-sm text-center hidden">请先在管理后台上传收款码</span>`;
    }
  } else if (method === 'alipay') {
    if (state.paymentCodes.alipay) {
      codeImage.innerHTML = `<img src="${state.paymentCodes.alipay}" alt="支付宝收款码" class="w-full h-full object-contain">`;
    } else {
      codeImage.innerHTML = `<img src="images/alipay.jpg" alt="支付宝收款码" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <span class="text-gray-500 text-sm text-center hidden">请先在管理后台上传收款码</span>`;
    }
  }
  
  const btn = document.getElementById('confirmPaymentBtn');
  btn.disabled = false;
  btn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
  btn.classList.add('gold-gradient', 'text-slate-900', 'hover:opacity-90', 'cursor-pointer');
}

function confirmPayment() {
  if (!selectedPayment) {
    alert('请选择支付方式！');
    return;
  }
  
  const order = state.orders.find(o => o.id === state.currentOrder.id);
  if (order) {
    order.status = 'paid';
    order.paymentMethod = selectedPayment;
    order.trackingNumber = 'SF' + Math.random().toString(36).substr(2, 10).toUpperCase();
    
    setTimeout(() => {
      const o = state.orders.find(or => or.id === order.id);
      if (o && o.status === 'paid') {
        o.status = 'shipped';
        saveState();
      }
    }, 5000);
    
    setTimeout(() => {
      const o = state.orders.find(or => or.id === order.id);
      if (o && o.status === 'shipped') {
        o.status = 'delivered';
        saveState();
      }
    }, 10000);
  }
  
  saveState();
  alert('支付成功！');
  navigate('orders');
}

function payOrder(orderId) {
  const order = state.orders.find(o => o.id === orderId);
  if (order) {
    state.currentOrder = order;
    navigate('payment');
  }
}

let currentRating = 0;
function setRating(rating) {
  currentRating = rating;
  document.querySelectorAll('.rating-star').forEach((el, i) => {
    if (i < rating) {
      el.classList.remove('text-gray-300');
      el.classList.add('text-yellow-500');
    } else {
      el.classList.remove('text-yellow-500');
      el.classList.add('text-gray-300');
    }
  });
}

function submitReview(orderId) {
  const reviewText = document.getElementById('reviewText').value;
  
  if (!currentRating) {
    alert('请选择评分！');
    return;
  }
  
  if (!reviewText) {
    alert('请输入评价内容！');
    return;
  }
  
  const order = state.orders.find(o => o.id === orderId);
  if (order) {
    order.review = reviewText;
    order.rating = currentRating;
    order.status = 'reviewed';
    saveState();
    alert('评价提交成功！');
    render();
  }
}

function toggleChat() {
  state.chatOpen = !state.chatOpen;
  render();
}

function sendMessage(e) {
  e.preventDefault();
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  
  if (!content) return;
  
  const msg = {
    id: generateId(),
    content,
    type: 'user',
    timestamp: new Date().toISOString()
  };
  
  state.messages.push(msg);
  if (!state.allMessages) state.allMessages = [];
  state.allMessages.push(msg);
  
  render();
  input.value = '';
  
  setTimeout(() => {
    const botMsg = botResponses[Math.floor(Math.random() * botResponses.length)];
    const reply = {
      id: generateId(),
      content: botMsg,
      type: 'bot',
      timestamp: new Date().toISOString()
    };
    state.messages.push(reply);
    state.allMessages.push(reply);
    saveState();
    render();
  }, 1000);
  
  saveState();
}

function scrollToServices() {
  document.getElementById('services').scrollIntoView({ behavior: 'smooth' });
}

function showAdminLogin() {
  const password = prompt('请输入管理员密码：');
  if (password === state.adminPassword) {
    state.isAdmin = true;
    navigate('admin');
  } else if (password) {
    alert('密码错误！');
  }
}

function updateOrderStatus(orderId, newStatus) {
  const order = state.orders.find(o => o.id === orderId);
  if (order) {
    order.status = newStatus;
    saveState();
    render();
  }
}

function adminQuickReply(message) {
  const reply = {
    id: generateId(),
    content: message,
    type: 'bot',
    timestamp: new Date().toISOString()
  };
  if (!state.allMessages) state.allMessages = [];
  state.allMessages.push(reply);
  saveState();
  render();
}

function uploadPaymentCode(type, input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      state.paymentCodes[type] = e.target.result;
      saveState();
      render();
      alert('收款码上传成功！');
    };
    reader.readAsDataURL(file);
  }
}

function changeAdminPassword() {
  const newPassword = document.getElementById('newAdminPassword').value;
  if (newPassword && newPassword.length >= 6) {
    state.adminPassword = newPassword;
    alert('密码修改成功！');
    render();
  } else {
    alert('密码至少需要6位！');
  }
}

loadState();
render();
  </script>
</body>
</html>
